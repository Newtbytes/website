name: Build and deploy Zola website
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: Build Zola + upload Pages artifact
        uses: getzola/github-pages@435a833fd3f1edcb28d70576c89e30a6365cd8f7
        with:
          zola_version: v0.22.0
          build_flags: --drafts

      - name: Deploy to neocities
        uses: bcomnes/deploy-to-neocities@v3.0.4
        with:
          cleanup: true
          neocities_supporter: false
          preview_before_deploy: true
          dist_dir: public
          api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
          api_key: ${{ secrets.NEOCITIES_API_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
