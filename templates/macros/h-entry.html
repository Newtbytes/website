{% macro dt_published(date, visible=false) %}
<time class="dt-published published" datetime="{{ date | date(format='%Y-%m-%dT%H:%M:%SZ') }}">
    {% if visible %}
    {{ date }}
    {% endif %}
</time>
{% endmacro dt_published %}


{% macro author_url(name, url, visible=false) %}
<address class="p-author author h-card vcard">
    <a href="{{ url }}" class="u-url url p-name fn" rel="author">
        {% if visible and name %}
        {{ name }}
        {% endif %}
    </a>
</address>
{% endmacro author_url %}
