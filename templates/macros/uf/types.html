{%- macro dt(date, type, visible=true) -%}
<time class="dt-{{ type }} {{ type }}" datetime="{{ date | date(format='%Y-%m-%dT%H:%M:%SZ') }}">
    {%- if visible -%}
    {{ date }}
    {%- endif -%}
</time>
{%- endmacro dt -%}


{%- macro p(value, type) -%}
<span class="p-{{type}} {{type}}">{{- value | safe -}}</span>,
{%- endmacro p -%}
