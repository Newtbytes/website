{% import "macros/utils.html" as utils %}

{% macro metadata(canon_url, author, title, desc="") %}
    <link rel="canonical" href="{{ canon_url | safe }}">
    <meta name="author" content="{{ author }}">
    <title>{{ title }}</title>
    {% if desc %}
        <meta name="description" content="{{ desc | striptags }}">
    {% endif %}
{% endmacro metadata %}
