{% macro link_person(url, text="", rel=[], invisible=false) %}
{%- if not text %}
{% set text = url %}
{% endif -%}
{% if rel %}
{% set rel = rel | join(sep=" ") %}
{% endif %}
<a href="{{ url }}" {% if rel %}rel={{ rel }}{% endif %}>
    {%- if not invisible -%}
    {{ text }}
    {%- endif -%}
</a>
{% endmacro link_person %}
